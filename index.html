<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LocalDrop</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --blue: #007AFF; --gray: #8E8E93; }
        body { 
            font-family: -apple-system, "SF Pro Display", sans-serif; 
            background: #000; color: white; margin: 0; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: space-around; height: 100vh; overflow: hidden;
        }
        .header { text-align: center; }
        .radar-container {
            position: relative; width: 280px; height: 280px;
            display: flex; align-items: center; justify-content: center;
        }
        .circle {
            position: absolute; border: 1px solid rgba(0, 122, 255, 0.5);
            border-radius: 50%; animation: ripple 4s infinite ease-out;
        }
        @keyframes ripple { from { width: 0; height: 0; opacity: 1; } to { width: 100%; height: 100%; opacity: 0; } }
        
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 90%; }
        .action-btn {
            background: rgba(255,255,255,0.1); border-radius: 18px; padding: 20px;
            text-align: center; border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px); transition: 0.2s; cursor: pointer;
        }
        .action-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.2); }
        .action-btn svg { margin-bottom: 8px; stroke: var(--blue); }
        input[type="file"] { display: none; }
        #status { font-size: 14px; color: var(--gray); margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="font-weight: 600; margin: 0;">LocalDrop</h1>
        <p id="status">Connecting to Peer Network...</p>
    </div>

    <div class="radar-container">
        <div class="circle" style="animation-delay: 0s"></div>
        <div class="circle" style="animation-delay: 1s"></div>
        <div class="circle" style="animation-delay: 2s"></div>
        <div style="z-index: 10; background: var(--blue); padding: 20px; border-radius: 50%; box-shadow: 0 0 30px rgba(0,122,255,0.5);">
            📱
        </div>
    </div>

    <div class="menu-grid">
        <label class="action-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path><polyline points="13 2 13 9 20 9"></polyline></svg>
            <div>Files</div>
            <input type="file" id="fileInput" multiple>
        </label>
        <label class="action-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
            <div>Folder</div>
            <input type="file" id="folderInput" webkitdirectory directory>
        </label>
        <div class="action-btn" onclick="connectGoogleDrive()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M8 12h8m-4-4v8"></path></svg>
            <div>Drive</div>
        </div>
        <div class="action-btn" onclick="manualConnect()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"></path></svg>
            <div>IP Send</div>
        </div>
    </div>

    <script>
        // Extract Peer ID from URL (e.g., your-vercel-app.com?id=PC-1234)
        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('id');
        const peer = new Peer();

        peer.on('open', (id) => {
            document.getElementById('status').innerText = "Ready to share.";
            if (targetId) connectToPC(targetId);
        });

        function connectToPC(id) {
            const conn = peer.connect(id);
            conn.on('open', () => {
                document.getElementById('status').innerText = "Connected to PC";
                setupSender(conn);
            });
        }

        function setupSender(conn) {
            document.getElementById('fileInput').onchange = (e) => {
                const files = e.target.files;
                for(let f of files) conn.send({ file: f, name: f.name });
                alert("Sent!");
            };
        }

        function manualConnect() {
            const id = prompt("Enter Device Peer ID:");
            if(id) connectToPC(id);
        }

        function connectGoogleDrive() {
            alert("Google Drive integration requires a Developer API Key. Add the Google Picker SDK to enable.");
        }
    </script>
</body>
</html>
