<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f5f5f7; margin: 0; padding: 20px; color: #1d1d1f; text-align: center; }
        .card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-top: 20px; }
        .btn { background: #007aff; color: white; border: none; padding: 15px 30px; border-radius: 12px; font-weight: 600; width: 100%; margin: 10px 0; font-size: 16px; }
        .input-box { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; text-align: center; font-size: 18px; }
        .status { font-size: 14px; color: #888; margin-bottom: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <h1>LocalDrop</h1>
    <div id="my-id-display" class="status">Generating your ID...</div>

    <div id="view-discovery" class="card">
        <h3>Connect to a Device</h3>
        <p>Enter the ID shown on the other device:</p>
        <input type="text" id="target-id" class="input-box" placeholder="e.g. LocalDrop-PC-1234">
        <button class="btn" onclick="connectToId()">Connect Now</button>
        <p style="font-size: 12px;">Scanning a QR code will do this automatically.</p>
    </div>

    <div id="view-transfer" class="card hidden">
        <h2 style="color: #34c759;">✓ Connected</h2>
        <p>The other device is ready.</p>
        
        <input type="file" id="f-upload" multiple style="display:none" onchange="sendFiles(this.files)">
        <button class="btn" onclick="document.getElementById('f-upload').click()">📁 Select Files to Send</button>
        <button class="btn" style="background:#555" onclick="location.reload()">Disconnect</button>
        
        <div id="transfer-status" style="margin-top:20px; font-weight: bold;"></div>
    </div>

    <script>
        const peer = new Peer('Device-' + Math.floor(Math.random()*9999));
        let activeConn;

        peer.on('open', (id) => {
            document.getElementById('my-id-display').innerText = "Your ID: " + id;
            const urlId = new URLSearchParams(window.location.search).get('id');
            if(urlId) connectToId(urlId);
        });

        peer.on('connection', (conn) => {
            setupConnection(conn);
        });

        function connectToId(manualId) {
            const id = manualId || document.getElementById('target-id').value;
            if(!id) return alert("Please enter an ID");
            const conn = peer.connect(id);
            setupConnection(conn);
        }

        function setupConnection(conn) {
            activeConn = conn;
            document.getElementById('view-discovery').classList.add('hidden');
            document.getElementById('view-transfer').classList.remove('hidden');
            
            conn.on('data', (data) => {
                if(data.type === 'file') {
                    const blob = new Blob([data.file]);
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = data.name;
                    a.click();
                    document.getElementById('transfer-status').innerText = "📥 Received: " + data.name;
                }
            });
        }

        function sendFiles(files) {
            for(let f of files) {
                activeConn.send({ type: 'file', name: f.name, file: f });
                document.getElementById('transfer-status').innerText = "📤 Sent: " + f.name;
            }
        }
    </script>
</body>
</html>
