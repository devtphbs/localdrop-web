<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LocalDrop | Universal Share</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --blue: #007AFF; --green: #34C759; --bg: #F5F5F7; --card: #FFFFFF; --text: #1D1D1F; }
        @media (prefers-color-scheme: dark) { :root { --bg: #000000; --card: #1C1C1E; --text: #FFFFFF; } }

        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        
        /* Download Section */
        .dl-section { margin-bottom: 30px; text-align: center; }
        .dl-group { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 10px; }
        .dl-btn { background: rgba(128,128,128,0.15); color: var(--text); text-decoration: none; padding: 10px 18px; border-radius: 20px; font-size: 13px; font-weight: 600; border: 1px solid rgba(128,128,128,0.2); transition: 0.2s; }
        .dl-btn:hover { background: var(--blue); color: white; border-color: var(--blue); }

        /* Radar Pulse */
        .radar { width: 200px; height: 200px; position: relative; display: flex; align-items: center; justify-content: center; margin: 40px 0; }
        .ring { position: absolute; border: 2px solid var(--blue); border-radius: 50%; animation: ripple 4s infinite linear; opacity: 0; }
        @keyframes ripple { 0% { width: 0; height: 0; opacity: 1; } 100% { width: 100%; height: 100%; opacity: 0; } }
        .icon-circle { background: var(--blue); width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; z-index: 5; box-shadow: 0 0 30px rgba(0,122,255,0.3); }

        .card { background: var(--card); width: 100%; max-width: 400px; border-radius: 24px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .btn { background: var(--blue); color: white; border: none; padding: 16px; border-radius: 14px; width: 100%; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .input-field { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid rgba(128,128,128,0.2); background: rgba(128,128,128,0.05); color: var(--text); font-size: 16px; margin-bottom: 10px; box-sizing: border-box; text-align: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="dl-section">
        <p style="font-weight: 600; margin: 0;">Download LocalDrop Desktop</p>
        <div class="dl-group">
            <a href="https://github.com/devtphbs/localdrop-pc/releases/download/v1.0.9/LocalDrop-Setup-1.0.9.exe" class="dl-btn">🪟 Windows</a>
            <a href="https://github.com/devtphbs/localdrop-pc/releases/download/v1.0.9/LocalDrop-1.0.9-arm64.dmg" class="dl-btn">🍎 macOS</a>
            <a href="https://github.com/devtphbs/localdrop-pc/releases/download/v1.0.9/LocalDrop-1.0.9.AppImage" class="dl-btn">🐧 Linux</a>
        </div>
    </div>

    <div style="text-align: center;">
        <h1 style="margin:0">LocalDrop</h1>
        <p id="my-id" style="opacity:0.5; font-size:14px">Initializing...</p>
    </div>

    <div class="radar">
        <div class="ring" style="animation-delay: 0s"></div>
        <div class="ring" style="animation-delay: 1.5s"></div>
        <div class="icon-circle" id="main-icon">📱</div>
    </div>

    <div id="setup-view" class="card">
        <input type="text" id="target-id" class="input-field" placeholder="Enter Destination ID">
        <button class="btn" onclick="connect()">Connect to Device</button>
        <div style="margin-top:15px; font-size: 12px;">
            <label><input type="checkbox" id="safe-mode"> Enable Safe Mode</label>
        </div>
    </div>

    <div id="transfer-view" class="card hidden">
        <h2 style="color:var(--green)">✓ Connected</h2>
        <button class="btn" onclick="document.getElementById('file-in').click()">📤 Send Files</button>
        <input type="file" id="file-in" multiple style="display:none" onchange="sendFiles(this.files)">
        <button class="btn" style="background:#888; margin-top:10px" onclick="location.reload()">Disconnect</button>
    </div>

    <audio id="snd-in" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>
    <audio id="snd-out" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>

    <script>
        const peer = new Peer('User-' + Math.floor(Math.random()*90000));
        let activeConn;

        peer.on('open', (id) => {
            document.getElementById('my-id').innerText = "Your ID: " + id;
            const urlParams = new URLSearchParams(window.location.search);
            if(urlParams.get('id')) connect(urlParams.get('id'));
        });

        peer.on('connection', (conn) => setup(conn));

        function connect(idOverride) {
            const id = idOverride || document.getElementById('target-id').value;
            if(!id) return;
            setup(peer.connect(id));
        }

        function setup(conn) {
            activeConn = conn;
            conn.on('open', () => {
                document.getElementById('setup-view').classList.add('hidden');
                document.getElementById('transfer-view').classList.remove('hidden');
                document.getElementById('main-icon').innerText = "✓";
                document.getElementById('main-icon').style.background = "var(--green)";
            });

            conn.on('data', (data) => {
                if(document.getElementById('safe-mode').checked) {
                    if(!confirm("Accept " + data.name + "?")) return;
                }
                const blob = new Blob([data.file]);
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = data.name;
                a.click();
                document.getElementById('snd-in').play();
            });
        }

        function sendFiles(files) {
            for(let f of files) activeConn.send({ type: 'file', name: f.name, file: f });
            document.getElementById('snd-out').play();
        }
    </script>
</body>
</html>
