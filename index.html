<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalDrop | Share</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #3b82f6; --success: #10b981; --text: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { background: var(--card); padding: 2.5rem; border-radius: 1.5rem; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.4); }
        .btn { display: block; padding: 15px; margin: 10px 0; border-radius: 10px; text-decoration: none; font-weight: 800; }
        .win { background: var(--primary); color: white; }
        input { width: 100%; padding: 15px; background: #0f172a; border: 2px solid #334155; color: white; border-radius: 12px; margin: 15px 0; font-family: monospace; }
        #send-btn { background: var(--success); color: white; border: none; width: 100%; padding: 18px; border-radius: 12px; font-weight: 800; cursor: pointer; }
        .file-box { border: 2px dashed #334155; padding: 30px; border-radius: 12px; margin: 20px 0; cursor: pointer; }
        #status { margin-top: 15px; color: #94a3b8; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>LocalDrop <span style="font-size: 0.8rem; opacity: 0.5;">v1.1.7</span></h1>
        <a href="https://github.com/devtphbs/localdrop-pc/releases/download/v1.1.7/LocalDrop-Setup-1.1.7.exe" class="btn win">Download Windows</a>
        
        <div style="margin-top: 30px;">
            <p id="status">Connecting...</p>
            <input type="text" id="pcID" placeholder="Device ID (Auto-filled by QR)">
            <div class="file-box" onclick="document.getElementById('fileInput').click()">
                <span id="file-name">Tap to select file</span>
                <input type="file" id="fileInput" hidden onchange="document.getElementById('file-name').innerText = this.files[0].name">
            </div>
            <button id="send-btn" onclick="send()">Send to Device</button>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        const peer = new Peer();
        
        // AUTO-FILL ID FROM URL
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const target = params.get('target');
            if (target) {
                document.getElementById('pcID').value = target;
                document.getElementById('status').innerText = "Target Found: " + target;
            } else {
                document.getElementById('status').innerText = "Manual Mode";
            }
        };

        function send() {
            const id = document.getElementById('pcID').value;
            const file = document.getElementById('fileInput').files[0];
            if (!id || !file) return alert("Select ID and File!");
            
            const conn = peer.connect(id);
            conn.on('open', () => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    conn.send({ file: e.target.result, name: file.name, type: file.type });
                    alert("Sent!");
                };
                reader.readAsArrayBuffer(file);
            });
        }
    </script>
</body>
</html>
