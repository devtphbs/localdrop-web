<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalDrop | Share v1.1.7</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #3b82f6;
            --success: #10b981;
            --text: #f8fafc;
            --border: #334155;
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 1.5rem;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            text-align: center;
            border: 1px solid var(--border);
        }
        .download-area {
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }
        .btn {
            display: block;
            padding: 16px;
            margin: 12px 0;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 800;
            transition: 0.2s;
        }
        .win { background: var(--primary); color: white; }
        .mac { background: #f8fafc; color: #0f172a; }
        .linux { background: #475569; color: white; }
        
        input[type="text"] {
            width: 100%;
            padding: 16px;
            background: #0f172a;
            border: 2px solid var(--border);
            color: white;
            border-radius: 12px;
            margin: 15px 0;
            box-sizing: border-box;
            font-family: monospace;
        }
        .file-zone {
            border: 2px dashed var(--border);
            padding: 40px;
            border-radius: 15px;
            margin: 20px 0;
            cursor: pointer;
        }
        #send-btn {
            background: var(--success);
            color: white;
            border: none;
            width: 100%;
            padding: 18px;
            font-size: 1.1rem;
            font-weight: 800;
            border-radius: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="download-area">
            <h1>LocalDrop <span style="font-size: 0.9rem; opacity: 0.6;">v1.1.7</span></h1>
            <a href="https://github.com/devtphbs/localdrop-pc/releases/download/v1.1.7/LocalDrop-Setup-1.1.7.exe" class="btn win">Download for Windows</a>
            <a href="https://github.com/devtphbs/localdrop-pc/releases/download/v1.1.7/LocalDrop-1.1.7-arm64.dmg" class="btn mac">Download for Mac</a>
            <a href="https://github.com/devtphbs/localdrop-pc/releases/download/v1.1.7/LocalDrop-1.1.7.AppImage" class="btn linux">Download for Linux</a>
        </div>

        <div class="sender">
            <input type="text" id="pcID" placeholder="Enter Device ID">
            <div class="file-zone" onclick="document.getElementById('fileInput').click()">
                <span id="file-name">Click to select file</span>
                <input type="file" id="fileInput" hidden onchange="document.getElementById('file-name').innerText = this.files[0].name">
            </div>
            <button id="send-btn" onclick="send()">Send to PC</button>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        const peer = new Peer();
        function send() {
            const id = document.getElementById('pcID').value;
            const file = document.getElementById('fileInput').files[0];
            if (!id || !file) return alert("Missing ID or File");
            
            const conn = peer.connect(id);
            conn.on('open', () => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    conn.send({ file: e.target.result, name: file.name, type: file.type });
                    alert("Sent!");
                };
                reader.readAsArrayBuffer(file);
            });
        }
    </script>
</body>
</html>
