<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalDrop Mobile</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #3b82f6;
            --text: #f8fafc;
        }
        body { 
            font-family: sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #334155;
            box-sizing: border-box;
        }
        input { background: #0f172a; color: white; }
        button { 
            background: var(--primary); 
            color: white; 
            border: none; 
            font-weight: bold; 
            cursor: pointer;
        }
        #status {
            font-size: 0.9rem;
            margin: 10px 0;
            color: #94a3b8;
        }
        .file-label {
            display: block;
            background: #334155;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            border: 2px dashed #475569;
        }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h2>LocalDrop Mobile</h2>
        
        <p id="status">Status: Disconnected</p>
        
        <input type="text" id="pcID" placeholder="Enter PC ID (e.g. localdrop-pc-1234)">
        <button onclick="connectToPC()">Connect to PC</button>

        <hr style="border: 0.5px solid #334155; margin: 20px 0;">

        <label class="file-label" for="fileInput" id="fileLabel">
            Click to Select File
        </label>
        <input type="file" id="fileInput" onchange="updateLabel()">
        
        <button onclick="sendFile()" style="background: #10b981; margin-top: 20px;">Send File</button>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <script>
        let peer = new Peer();
        let conn = null;

        // Update UI when file is chosen
        function updateLabel() {
            const input = document.getElementById('fileInput');
            const label = document.getElementById('fileLabel');
            if (input.files.length > 0) {
                label.innerText = "Selected: " + input.files[0].name;
                label.style.borderColor = "#3b82f6";
            }
        }

        // 1. Connect to the PC
        function connectToPC() {
            const id = document.getElementById('pcID').value;
            if (!id) return alert("Enter the PC ID first!");

            document.getElementById('status').innerText = "Status: Connecting...";
            conn = peer.connect(id);

            conn.on('open', () => {
                document.getElementById('status').innerText = "Status: Connected to PC ✅";
                document.getElementById('status').style.color = "#10b981";
            });

            conn.on('close', () => {
                document.getElementById('status').innerText = "Status: Disconnected ❌";
                document.getElementById('status').style.color = "#ef4444";
            });

            conn.on('error', (err) => {
                alert("Connection failed. Check the ID.");
                console.error(err);
            });
        }

        // 2. Send the file
        function sendFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];

            if (!conn || !conn.open) {
                return alert("Connect to the PC first!");
            }
            if (!file) {
                return alert("Please select a file!");
            }

            document.getElementById('status').innerText = "Status: Sending...";

            const reader = new FileReader();
            reader.onload = function(event) {
                // We send a structured object so the PC knows exactly what to do
                const blob = new Uint8Array(event.target.result);
                
                conn.send({
                    file: blob,
                    name: file.name,
                    type: file.type,
                    size: file.size
                });

                alert("File sent! Check your PC.");
                document.getElementById('status').innerText = "Status: Connected ✅";
            };

            reader.readAsArrayBuffer(file);
        }
    </script>
</body>
</html>
