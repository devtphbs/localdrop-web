<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LocalDrop</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --blue: #007AFF; --gray: #8E8E93; }
        body { 
            font-family: -apple-system, sans-serif; background: #000; color: #fff; margin: 0; 
            display: flex; flex-direction: column; align-items: center; height: 100vh; justify-content: space-around;
        }
        .header { text-align: center; }
        .radar-container { position: relative; width: 280px; height: 280px; display: flex; align-items: center; justify-content: center; }
        .circle { position: absolute; border: 1.5px solid rgba(0, 122, 255, 0.4); border-radius: 50%; animation: ripple 4s infinite cubic-bezier(0, 0.2, 0.8, 1); }
        @keyframes ripple { from { width: 0; height: 0; opacity: 1; } to { width: 100%; height: 100%; opacity: 0; } }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 90%; }
        .action-btn { background: rgba(255,255,255,0.08); border-radius: 20px; padding: 25px 15px; text-align: center; backdrop-filter: blur(20px); transition: 0.2s; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }
        .action-btn:active { transform: scale(0.92); background: rgba(255,255,255,0.15); }
        .action-btn div { margin-top: 10px; font-weight: 500; font-size: 14px; }
        input[type="file"] { display: none; }
        #status { font-size: 13px; color: var(--gray); margin-top: 5px; }
    </style>
</head>
<body>
    <div class="header">
        <h1 style="font-weight: 700; margin: 0; font-size: 28px;">LocalDrop</h1>
        <p id="status">Scanning for PC...</p>
    </div>

    <div class="radar-container">
        <div class="circle" style="animation-delay: 0s"></div>
        <div class="circle" style="animation-delay: 1.5s"></div>
        <div class="circle" style="animation-delay: 3s"></div>
        <div style="z-index: 10; background: var(--blue); padding: 25px; border-radius: 50%; font-size: 30px; box-shadow: 0 0 50px rgba(0, 122, 255, 0.6);">📱</div>
    </div>

    <div class="menu-grid">
        <label class="action-btn">
            📁 <div>Files</div>
            <input type="file" id="fileInput" multiple>
        </label>
        <label class="action-btn">
            📦 <div>Folder</div>
            <input type="file" id="folderInput" webkitdirectory directory>
        </label>
        <div class="action-btn" onclick="connectGoogleDrive()">☁️ <div>Drive</div></div>
        <div class="action-btn" onclick="manualConnect()">📡 <div>Manual IP</div></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('id');
        const peer = new Peer();
        let connection;

        peer.on('open', (id) => {
            if (targetId) {
                document.getElementById('status').innerText = "Connecting to PC...";
                connectToPC(targetId);
            } else {
                document.getElementById('status').innerText = "Awaiting Peer ID...";
            }
        });

        function connectToPC(id) {
            connection = peer.connect(id);
            connection.on('open', () => {
                document.getElementById('status').innerText = "Connected! Send anything.";
                setupTransfer();
            });
            connection.on('error', () => document.getElementById('status').innerText = "Connection Failed.");
        }

        function setupTransfer() {
            const sendFiles = (files) => {
                document.getElementById('status').innerText = `Sending ${files.length} items...`;
                for(let f of files) connection.send({ name: f.name, file: f });
                setTimeout(() => document.getElementById('status').innerText = "Transfer Complete!", 2000);
            };

            document.getElementById('fileInput').onchange = (e) => sendFiles(e.target.files);
            document.getElementById('folderInput').onchange = (e) => sendFiles(e.target.files);
        }

        function manualConnect() {
            const id = prompt("Enter the Peer ID shown on your PC:");
            if(id) connectToPC(id);
        }

        function connectGoogleDrive() {
            alert("To enable Google Drive, you must add your Google Client ID to this script. Features like 'Picker API' require authentication.");
        }
    </script>
</body>
</html>
