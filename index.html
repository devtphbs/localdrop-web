<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; align-items: center; justify-content: space-between; padding: 40px 20px; box-sizing: border-box; }
        
        /* Radar Animation */
        .radar { width: 220px; height: 220px; position: relative; display: flex; align-items: center; justify-content: center; }
        .ring { position: absolute; border: 2px solid #007aff; border-radius: 50%; animation: pulse 4s infinite linear; opacity: 0; }
        @keyframes pulse { from { width: 0; height: 0; opacity: 1; } to { width: 300px; height: 300px; opacity: 0; } }
        
        .circle-ui { background: #007aff; padding: 30px; border-radius: 50%; font-size: 40px; z-index: 10; box-shadow: 0 0 50px rgba(0, 122, 255, 0.4); }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        .action-btn { background: rgba(255,255,255,0.1); border-radius: 20px; padding: 25px; text-align: center; font-weight: 600; border: 1px solid rgba(255,255,255,0.05); }
        input[type="file"] { display: none; }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <h1 style="margin:0; font-weight: 800;">LocalDrop</h1>
        <p id="status" style="color: #888;">Connecting to PC...</p>
    </div>

    <div class="radar">
        <div class="ring" style="animation-delay: 0s"></div>
        <div class="ring" style="animation-delay: 1.3s"></div>
        <div class="ring" style="animation-delay: 2.6s"></div>
        <div class="circle-ui">📱</div>
    </div>

    <div class="btn-grid">
        <label class="action-btn">Files <input type="file" multiple onchange="upload(this.files)"></label>
        <label class="action-btn">Folder <input type="file" webkitdirectory directory onchange="upload(this.files)"></label>
    </div>

    <script>
        const targetId = new URLSearchParams(window.location.search).get('id');
        const peer = new Peer({ config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] } });
        let conn;

        peer.on('open', () => { if(targetId) connect(targetId); });

        function connect(id) {
            conn = peer.connect(id);
            conn.on('open', () => {
                document.getElementById('status').innerText = "Connected! Send or Receive.";
                
                // Receive FROM PC
                conn.on('data', (data) => {
                    const blob = new Blob([data.file]);
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = data.name;
                    link.click();
                    alert("Received from PC: " + data.name);
                });
            });
        }

        function upload(files) {
            if(!conn) return alert("Not connected!");
            for(let f of files) conn.send({ type: 'file', name: f.name, file: f });
        }
    </script>
</body>
</html>
