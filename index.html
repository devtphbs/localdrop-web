<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalDrop | Share v1.1.9</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #3b82f6; --success: #10b981; --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { background: var(--card); padding: 2rem; border-radius: 1.5rem; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.4); border: 1px solid #334155; }
        .btn { display: block; padding: 14px; margin: 8px 0; border-radius: 10px; text-decoration: none; font-weight: 800; font-size: 0.9rem; transition: 0.2s; }
        .win { background: var(--primary); color: white; }
        .mac { background: #f8fafc; color: #0f172a; }
        .linux { background: #475569; color: white; }
        input[type="text"] { width: 100%; padding: 14px; background: #0f172a; border: 2px solid #334155; color: white; border-radius: 10px; margin: 15px 0; font-family: monospace; }
        #send-btn { background: var(--success); color: white; border: none; width: 100%; padding: 16px; border-radius: 10px; font-weight: 800; cursor: pointer; }
        #status { margin-top: 15px; color: #94a3b8; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>LocalDrop <span style="opacity:0.5; font-size:0.8rem;">v1.1.9</span></h1>
        
        <div style="margin-bottom: 20px;">
            <a href="https://github.com/devtphbs/localdrop-pc/releases/download/v1.1.9/LocalDrop-Setup-1.1.9.exe" class="btn win">Download Windows (.exe)</a>
            <a href="https://github.com/devtphbs/localdrop-pc/releases/download/v1.1.9/LocalDrop-1.1.9-arm64.dmg" class="btn mac">Download Mac (.dmg)</a>
            <a href="https://github.com/devtphbs/localdrop-pc/releases/download/v1.1.9/LocalDrop-1.1.9.AppImage" class="btn linux">Download Linux (.AppImage)</a>
        </div>

        <hr style="border: 0.5px solid #334155; margin: 20px 0;">

        <p id="status">Ready to connect</p>
        <input type="text" id="pcID" placeholder="PC ID">
        <input type="file" id="fileInput" style="margin-bottom: 15px;">
        <button id="send-btn" onclick="send()">Send to PC</button>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        const peer = new Peer();
        let currentConn = null;

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const target = params.get('target');
            if (target) {
                document.getElementById('pcID').value = target;
                document.getElementById('status').innerText = "Auto-connected to: " + target;
                // Auto-initiate connection to enable two-way sharing
                connect(target);
            }
        };

        function connect(id) {
            currentConn = peer.connect(id);
            currentConn.on('open', () => {
                document.getElementById('status').innerText = "Connected to " + id + " (Two-Way Active)";
            });
            // Listen for files coming FROM the PC
            currentConn.on('data', (data) => {
                alert("Received file from PC: " + data.name);
                const blob = new Blob([data.file], { type: data.type });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = data.name;
                link.click();
            });
        }

        function send() {
            const id = document.getElementById('pcID').value;
            const file = document.getElementById('fileInput').files[0];
            if (!id || !file) return alert("Select File!");
            
            if (!currentConn || !currentConn.open) {
                connect(id);
                setTimeout(() => { if(currentConn.open) performSend(file); }, 1000);
            } else {
                performSend(file);
            }
        }

        function performSend(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                currentConn.send({ file: e.target.result, name: file.name, type: file.type });
                alert("Sent to PC!");
            };
            reader.readAsArrayBuffer(file);
        }
    </script>
</body>
</html>
