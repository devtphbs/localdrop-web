<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; margin: 0; display: flex; flex-direction: column; height: 100vh; align-items: center; justify-content: space-between; padding: 20px; box-sizing: border-box; }
        .radar { width: 250px; height: 250px; position: relative; display: flex; align-items: center; justify-content: center; }
        .ring { position: absolute; border: 1.5px solid #007aff; border-radius: 50%; animation: ripple 4s infinite linear; opacity: 0; }
        @keyframes ripple { from { width: 0; height: 0; opacity: 1; } to { width: 100%; height: 100%; opacity: 0; } }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        .btn { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 20px; text-align: center; font-weight: 600; font-size: 14px; backdrop-filter: blur(10px); }
        input[type="file"] { display: none; }
        #status { font-size: 12px; color: #888; }
    </style>
</head>
<body>
    <div style="text-align:center">
        <h1 style="margin:0">LocalDrop</h1>
        <p id="status">Scanning for your PC...</p>
    </div>

    <div class="radar">
        <div class="ring" style="animation-delay: 0s"></div>
        <div class="ring" style="animation-delay: 1.5s"></div>
        <div class="ring" style="animation-delay: 3s"></div>
        <div style="background: #007aff; padding: 25px; border-radius: 50%; font-size: 30px; z-index: 5;">📱</div>
    </div>

    <div class="btn-group">
        <label class="btn">📁 Files <input type="file" id="f" multiple onchange="send(this.files)"></label>
        <label class="btn">📦 Folder <input type="file" id="fo" webkitdirectory directory onchange="send(this.files)"></label>
        <div class="btn" onclick="sendClipboard()">📋 Clipboard</div>
        <div class="btn" onclick="manual()">📡 Manual ID</div>
    </div>

    <script>
        const pid = new URLSearchParams(window.location.search).get('id');
        const peer = new Peer();
        let conn;

        peer.on('open', () => { if(pid) connect(pid); });

        function connect(id) {
            conn = peer.connect(id);
            conn.on('open', () => {
                document.getElementById('status').innerText = "Connected to PC";
                // Listen for files PUSHED from PC to Mobile
                conn.on('data', (data) => {
                    if(data.type === 'file') {
                        const blob = new Blob([data.file]);
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url; a.download = data.name; a.click();
                        alert(`New file from PC: ${data.name}`);
                    }
                });
            });
        }

        function send(files) {
            for(let f of files) conn.send({ type: 'file', name: f.name, file: f });
            alert("Sent!");
        }

        function manual() {
            const id = prompt("Enter PC ID:");
            if(id) connect(id);
        }
    </script>
</body>
</html>
