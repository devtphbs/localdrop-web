<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalDrop | v1.1.6</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #3b82f6;
            --success: #10b981;
            --text: #f8fafc;
            --border: #334155;
        }
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 1.5rem;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            text-align: center;
            border: 1px solid var(--border);
        }
        .download-box {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        .btn {
            display: block;
            padding: 14px;
            margin: 10px 0;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.2s;
            font-size: 0.95rem;
        }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .win { background: var(--primary); color: white; }
        .mac { background: #f8fafc; color: #0f172a; }
        .linux { background: #475569; color: white; }
        
        input[type="text"] {
            width: 100%;
            padding: 14px;
            background: #0f172a;
            border: 1px solid var(--border);
            color: white;
            border-radius: 10px;
            margin: 10px 0;
            box-sizing: border-box;
            font-family: monospace;
        }
        .file-drop {
            border: 2px dashed var(--border);
            padding: 30px;
            border-radius: 12px;
            margin: 20px 0;
            cursor: pointer;
        }
        #send-btn {
            background: var(--success);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 800;
            border-radius: 10px;
            cursor: pointer;
        }
        #status { font-size: 0.9rem; color: #94a3b8; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="download-box">
            <h1>LocalDrop PC <span style="font-size: 0.8rem; color: #64748b;">v1.1.6</span></h1>
            <p style="color: #94a3b8; margin-bottom: 20px;">Fast, private file sharing</p>
            
            <a href="https://github.com/devtphbs/localdrop-pc/releases/download/v1.1.6/LocalDrop-Setup-1.1.6.exe" class="btn win">Download for Windows (.exe)</a>
            <a href="https://github.com/devtphbs/localdrop-pc/releases/download/v1.1.6/LocalDrop-1.1.6-arm64.dmg" class="btn mac">Download for Mac (Apple Silicon)</a>
            <a href="https://github.com/devtphbs/localdrop-pc/releases/download/v1.1.6/LocalDrop-1.1.6.AppImage" class="btn linux">Download for Linux (.AppImage)</a>
        </div>

        <div class="sender-section">
            <h3>Send to Device</h3>
            <p id="status">Status: Disconnected</p>
            
            <input type="text" id="pcID" placeholder="Enter Device ID">
            <button class="btn win" style="width:100%; border:none; cursor:pointer;" onclick="connectToPC()">Connect to Device</button>

            <div class="file-drop" onclick="document.getElementById('fileInput').click()">
                <span id="file-name">Tap to select file</span>
                <input type="file" id="fileInput" hidden onchange="showFileName()">
            </div>
            
            <button id="send-btn" onclick="sendFile()">Send Now</button>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        let peer = new Peer();
        let conn = null;

        function showFileName() {
            const file = document.getElementById('fileInput').files[0];
            if (file) document.getElementById('file-name').innerText = "Ready: " + file.name;
        }

        function connectToPC() {
            const id = document.getElementById('pcID').value;
            if (!id) return alert("Enter a Device ID!");
            document.getElementById('status').innerText = "Connecting...";
            conn = peer.connect(id);
            conn.on('open', () => {
                document.getElementById('status').innerText = "Connected ✅";
                document.getElementById('status').style.color = "#10b981";
            });
        }

        function sendFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            if (!conn || !conn.open) return alert("Connect first!");
            if (!file) return alert("Select a file!");

            const reader = new FileReader();
            reader.onload = function(e) {
                conn.send({
                    file: e.target.result,
                    name: file.name,
                    type: file.type,
                    size: file.size
                });
                alert("Sent!");
            };
            reader.readAsArrayBuffer(file);
        }
    </script>
</body>
</html>
